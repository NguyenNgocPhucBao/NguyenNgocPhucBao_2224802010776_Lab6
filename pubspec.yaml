name: offline_music_player
description: "A simple offline music player app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  provider: ^6.1.1
  shared_preferences: ^2.5.5
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  on_audio_query: ^2.9.0
  audio_session: ^0.1.18
  rxdart: ^0.27.7
  palette_generator: ^0.3.3+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/sample_songs/bensound-keptpromise.mp3
    - assets/audio/sample_songs/bensound-watchthesea.mp3
    - assets/images/bai1.jpg
    - assets/images/bai2.jpg